name: Update Images

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Cloudinary images
        run: |
          curl -u "${{ secrets.CLOUDINARY_API_KEY }}:${{ secrets.CLOUDINARY_API_SECRET }}" \
          "https://api.cloudinary.com/v1_1/${{ secrets.CLOUDINARY_CLOUD_NAME }}/resources/image/upload?prefix=&max_results=100&direction=desc" \
          -o images.json

      - name: Extract resources array
        run: |
          jq '.resources' images.json > temp.json
          mv temp.json images.json

      - name: Commit updated JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add images.json

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update images"
            git push
          fi
