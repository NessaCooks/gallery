name: Update Images

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Cloudinary images
        run: |
          curl -u "${{ secrets.CLOUDINARY_API_KEY }}:${{ secrets.CLOUDINARY_API_SECRET }}" \
          "https://api.cloudinary.com/v1_1/${{ secrets.CLOUDINARY_CLOUD_NAME }}/resources/image/upload?prefix=gallery/" \
          -o images.json

      - name: Extract resources array
        run: |
          jq '.resources' images.json > temp.json
          mv temp.json images.json

      - name: Commit updated JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add images.json

          git diff --quiet && git diff --staged --quiet || git commit -m "Update images"

          git push
